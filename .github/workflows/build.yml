name: Build AIPlayer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos SDKs
        uses: actions/cache@v4
        with:
          path: ~/theos/sdks
          key: theos-sdks-${{ runner.os }}-v1

      - name: Cache Theos core
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-${{ hashFiles('**/Makefile') }}-v1
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install packaging tools (dpkg, ldid)
        run: |
          set -euo pipefail
          brew install dpkg ldid
          which ldid
          ldid -h > /dev/null 2>&1 || { echo "ERROR: ldid installed but not runnable (check dyld arch errors above)"; exit 1; }

          # Not brew-installing fakeroot: Homebrew's native arm64 build ships
          # an arm64e-only libfakeroot.dylib, which crashes dyld on GitHub's
          # Apple Silicon runners ("incompatible architecture (have 'arm64',
          # need 'arm64e')"). Theos's $(FAKEROOT) is invoked throughout
          # staging/signing (not just deb.mk's packaging line), so this
          # ephemeral CI container -- which has no real multi-user ownership
          # to fake -- gets a shim on PATH instead: it strips fakeroot's own
          # flags/persistence args and execs the wrapped command directly.
          mkdir -p "$HOME/.local/bin"
          cat << 'EOF' | sed 's/^[[:space:]]*//' > "$HOME/.local/bin/fakeroot"
          #!/bin/sh
          while [ "$#" -gt 0 ]; do
          case "$1" in
          --) shift; break ;;
          -i|-s|-p) shift 2 ;;
          *) shift ;;
          esac
          done
          exec "$@"
          EOF
          chmod +x "$HOME/.local/bin/fakeroot"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          which fakeroot

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          if [ -d "$HOME/theos" ]; then
            echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
            echo "$HOME/theos/bin"   >> "$GITHUB_PATH"
          else
            echo "ERROR: Theos not found"; exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Core ML conversion dependencies
        run: |
          set -euo pipefail
          # torch pinned per coremltools' own compatibility notes.
          pip install torch==2.7.0 coremltools

      # ── Checkpoint -> Core ML ────────────────────────────────────────────
      # Produces SwipeAnnotator.mlmodelc in the repo root. The Makefile's
      # AIPlayer_RESOURCE_DIRS = SwipeAnnotator.mlmodelc then copies it into
      # the tweak's resource bundle during `make`. This step MUST run
      # before Build.
      #
      # convert_to_coreml.py emits the "neuralnetwork" Core ML spec format,
      # whose container is a single .mlmodel file -- NOT .mlpackage (that's
      # the ML Program format's container, and mixing the two produces a
      # .mlmodelc with no valid compiled model inside it, which then fails
      # opaquely at load time). See convert_to_coreml.py's module docstring
      # for why "neuralnetwork" is used here.
      #
      # --checkpoint points at checkpoints/best.pt, committed to this repo.
      # If your checkpoint lives somewhere else (Kaggle, cloud storage),
      # replace this with a download step that produces that same path
      # before the conversion runs.
      - name: Convert checkpoint to Core ML
        run: |
          set -euo pipefail
          python convert_to_coreml.py \
            --checkpoint checkpoints/best.pt \
            --out SwipeAnnotator.mlmodel \
            --img_size 128

          # `xcrun coremlcompiler compile` can print errors and still exit 0,
          # so treat any "error" text in its output as fatal regardless of
          # exit code.
          xcrun coremlcompiler compile SwipeAnnotator.mlmodel . 2>&1 | tee /tmp/coremlcompiler.log
          compiler_status=${PIPESTATUS[0]}
          if [ "$compiler_status" -ne 0 ] || grep -qi "error" /tmp/coremlcompiler.log; then
            echo "ERROR: coremlcompiler reported a failure (or nonzero exit) -- see log above."
            exit 1
          fi

          test -d SwipeAnnotator.mlmodelc || { echo "ERROR: SwipeAnnotator.mlmodelc was not produced"; exit 1; }
          echo "Model compiled:"
          du -sh SwipeAnnotator.mlmodelc

          # XXX_BUNDLE_RESOURCE_DIRS (what the Makefile uses to stage this)
          # copies a directory's CONTENTS into the bundle, flattening it --
          # it does not preserve the directory itself. Since
          # SwipeAnnotator.mlmodelc must survive as an actual directory
          # (Core ML's MLModel loader expects to open a folder by that
          # name, not find its contents loose), stage it inside a wrapper
          # directory. Flattening the WRAPPER's contents into the bundle
          # then correctly leaves SwipeAnnotator.mlmodelc intact as a
          # subdirectory one level down:
          #   mlmodel_bundle/SwipeAnnotator.mlmodelc/...  --(flatten mlmodel_bundle)-->
          #   AIPlayer.bundle/SwipeAnnotator.mlmodelc/...
          # The Makefile points AIPlayer_BUNDLE_RESOURCE_DIRS at
          # mlmodel_bundle, not at SwipeAnnotator.mlmodelc directly.
          rm -rf mlmodel_bundle
          mkdir mlmodel_bundle
          mv SwipeAnnotator.mlmodelc mlmodel_bundle/
          echo "Staged for packaging:"
          find mlmodel_bundle -maxdepth 2

          # Load-back sanity check: confirms the *source* SwipeAnnotator.mlmodel
          # is valid and produces sane output shapes, via one dummy forward pass.
          #
          # Deliberately loads SwipeAnnotator.mlmodel here, NOT the compiled
          # SwipeAnnotator.mlmodelc from the step above. ct.models.MLModel()
          # loads a path via coremltools' package/manifest logic, which expects
          # either a plain .mlmodel file or an ML-Program .mlpackage bundle --
          # an already-AOT-compiled .mlmodelc (this script's "neuralnetwork"/
          # Espresso format) never contains a Manifest.json, so pointing
          # MLModel() at it always raises "A valid manifest does not exist",
          # even when the .mlmodelc is completely fine. That's a Python-loader
          # limitation, not evidence of a broken compile -- the .mlmodelc is
          # exactly what ships in the tweak bundle and is what device runtime
          # (AIPlayer.xm) loads directly via the MLModel API, which does not
          # have this restriction.
          #
          # Shapes below mirror --img_size 128 above and AIPlayer.xm's
          # kHidden/kFastLayers/kSlowLayers constants (192/2/1, so
          # slow_hidden = 192/2 = 96). If you change the architecture or
          # img_size, update both this block and the matching constants in
          # AIPlayer.xm together.
          python3 - << 'PYEOF'
          import coremltools as ct
          import numpy as np

          m = ct.models.MLModel("SwipeAnnotator.mlmodel")
          spec = m.get_spec()
          print(f"Loaded OK. {len(spec.description.input)} inputs, {len(spec.description.output)} outputs.")

          img = 128
          inputs = {
              "fast_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "slow_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "has_slow":   np.zeros((1,), dtype=np.float32),
              "h_fast_in":  np.zeros((2, 1, 192), dtype=np.float32),
              "h_slow_in":  np.zeros((1, 1, 96), dtype=np.float32),
          }
          out = m.predict(inputs)
          for k, v in out.items():
              print(f"  {k}: shape={np.array(v).shape}")
          print("Dummy forward pass succeeded.")
          PYEOF

      - name: Build tweak
        run: |
          set -euo pipefail
          which dpkg-deb || echo "WARNING: dpkg-deb not on PATH — packaging will fail"
          which ldid || echo "WARNING: ldid not on PATH — signing will fail"
          which fakeroot || echo "WARNING: fakeroot shim not on PATH — staging/signing will fail"
          make clean || true
          make package FINALPACKAGE=1 V=1

      - name: Locate build output
        id: find_deb
        run: |
          set -euo pipefail
          ls -la packages/ 2>/dev/null || echo "packages/ directory does not exist — packaging step did not run or failed silently"
          DEB_PATH=$(find packages -name '*.deb' 2>/dev/null | head -n1)
          if [ -z "$DEB_PATH" ]; then
            echo "ERROR: no .deb produced under packages/. Check the 'Build tweak' step log above for dpkg-deb errors."
            exit 1
          fi
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify model was staged into the package
        run: |
          set -euo pipefail
          # Guards against a silent-no-op staging bug: an incorrect Theos
          # resource variable name (e.g. XXX_RESOURCE_DIRS instead of
          # XXX_BUNDLE_RESOURCE_DIRS for a tweak-type Makefile target) makes
          # `make package` succeed with no warning while simply never
          # copying SwipeAnnotator.mlmodelc into the .deb. dpkg-deb -c lists
          # every path dpkg actually put in the package -- if the model
          # isn't in that list, AIPlayer.xm has nothing to load on-device
          # no matter how its runtime lookup logic searches for it.
          echo "Package contents:"
          dpkg-deb -c "${{ steps.find_deb.outputs.deb_path }}"
          if ! dpkg-deb -c "${{ steps.find_deb.outputs.deb_path }}" | grep -q "SwipeAnnotator.mlmodelc/"; then
            echo "ERROR: SwipeAnnotator.mlmodelc is NOT present in the built .deb."
            echo "This means the model was never staged during 'make package' --"
            echo "check the Makefile's resource-staging variable (must be"
            echo "AIPlayer_BUNDLE_RESOURCE_DIRS for a tweak-type target, not"
            echo "AIPlayer_RESOURCE_DIRS) before debugging anything at runtime."
            exit 1
          fi
          echo "OK: SwipeAnnotator.mlmodelc is present in the package."

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-dylib
          path: .theos/obj/arm64/AIPlayer.dylib
          if-no-files-found: error

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-deb
          path: ${{ steps.find_deb.outputs.deb_path }}
          if-no-files-found: error