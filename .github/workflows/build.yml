name: Build AIPlayer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos SDKs
        uses: actions/cache@v4
        with:
          path: ~/theos/sdks
          key: theos-sdks-${{ runner.os }}-v1

      - name: Cache Theos core
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-${{ hashFiles('**/Makefile') }}-v1
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          if [ -d "$HOME/theos" ]; then
            echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
            echo "$HOME/theos/bin"   >> "$GITHUB_PATH"
          else
            echo "ERROR: Theos not found"; exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Core ML conversion dependencies
        run: |
          set -euo pipefail
          # torch pinned per coremltools' own compatibility notes.
          pip install torch==2.7.0 coremltools

      # ── Checkpoint -> Core ML ────────────────────────────────────────────
      # Produces SwipeAnnotator.mlmodelc in the repo root. This step MUST
      # run before the dylib build (the Makefile no longer stages the model
      # at all -- it ships as its own independent artifact, see below).
      #
      # convert_to_coreml.py emits the "neuralnetwork" Core ML spec format,
      # whose container is a single .mlmodel file -- NOT .mlpackage (that's
      # the ML Program format's container, and mixing the two produces a
      # .mlmodelc with no valid compiled model inside it, which then fails
      # opaquely at load time). See convert_to_coreml.py's module docstring
      # for why "neuralnetwork" is used here.
      #
      # --checkpoint points at checkpoints/best.pt, committed to this repo.
      # If your checkpoint lives somewhere else (Kaggle, cloud storage),
      # replace this with a download step that produces that same path
      # before the conversion runs.
      - name: Convert checkpoint to Core ML
        run: |
          set -euo pipefail
          python convert_to_coreml.py \
            --checkpoint checkpoints/best.pt \
            --out SwipeAnnotator.mlmodel \
            --img_size 128

          # `xcrun coremlcompiler compile` can print errors and still exit 0,
          # so treat any "error" text in its output as fatal regardless of
          # exit code.
          xcrun coremlcompiler compile SwipeAnnotator.mlmodel . 2>&1 | tee /tmp/coremlcompiler.log
          compiler_status=${PIPESTATUS[0]}
          if [ "$compiler_status" -ne 0 ] || grep -qi "error" /tmp/coremlcompiler.log; then
            echo "ERROR: coremlcompiler reported a failure (or nonzero exit) -- see log above."
            exit 1
          fi

          test -d SwipeAnnotator.mlmodelc || { echo "ERROR: SwipeAnnotator.mlmodelc was not produced"; exit 1; }
          echo "Model compiled:"
          du -sh SwipeAnnotator.mlmodelc

          # Load-back sanity check: confirms the *source* SwipeAnnotator.mlmodel
          # is valid and produces sane output shapes, via one dummy forward pass.
          #
          # Deliberately loads SwipeAnnotator.mlmodel here, NOT the compiled
          # SwipeAnnotator.mlmodelc from the step above. ct.models.MLModel()
          # loads a path via coremltools' package/manifest logic, which expects
          # either a plain .mlmodel file or an ML-Program .mlpackage bundle --
          # an already-AOT-compiled .mlmodelc (this script's "neuralnetwork"/
          # Espresso format) never contains a Manifest.json, so pointing
          # MLModel() at it always raises "A valid manifest does not exist",
          # even when the .mlmodelc is completely fine. That's a Python-loader
          # limitation, not evidence of a broken compile -- the .mlmodelc is
          # exactly what ships to Sideloadly and is what device runtime
          # (AIPlayer.xm) loads directly via the MLModel API, which does not
          # have this restriction.
          #
          # Shapes below mirror --img_size 128 above and AIPlayer.xm's
          # kHidden/kFastLayers/kSlowLayers constants (192/2/1, so
          # slow_hidden = 192/2 = 96). If you change the architecture or
          # img_size, update both this block and the matching constants in
          # AIPlayer.xm together.
          python3 - << 'PYEOF'
          import coremltools as ct
          import numpy as np

          m = ct.models.MLModel("SwipeAnnotator.mlmodel")
          spec = m.get_spec()
          print(f"Loaded OK. {len(spec.description.input)} inputs, {len(spec.description.output)} outputs.")

          img = 128
          inputs = {
              "fast_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "slow_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "has_slow":   np.zeros((1,), dtype=np.float32),
              "h_fast_in":  np.zeros((2, 1, 192), dtype=np.float32),
              "h_slow_in":  np.zeros((1, 1, 96), dtype=np.float32),
          }
          out = m.predict(inputs)
          for k, v in out.items():
              print(f"  {k}: shape={np.array(v).shape}")
          print("Dummy forward pass succeeded.")
          PYEOF

      # ── Build the dylib ──────────────────────────────────────────────────
      # No dpkg-deb, ldid, or fakeroot needed anymore: this is a plain
      # `library` target (see Makefile), not a `tweak` target, so there's no
      # .deb to package and no ad-hoc signing step to fake root ownership
      # for. `make` alone produces the unsigned arm64 dylib; Sideloadly does
      # its own signing when it injects and installs.
      - name: Build dylib
        run: |
          set -euo pipefail
          make clean || true
          make FINALPACKAGE=1 V=1

      - name: Locate build output
        id: find_dylib
        run: |
          set -euo pipefail
          DYLIB_PATH=".theos/obj/arm64/AIPlayer.dylib"
          if [ ! -f "$DYLIB_PATH" ]; then
            echo "ERROR: $DYLIB_PATH not found. Check the 'Build dylib' step log above."
            exit 1
          fi
          echo "dylib_path=$DYLIB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-dylib
          path: ${{ steps.find_dylib.outputs.dylib_path }}
          if-no-files-found: error

      # ── Sideloadly deployment artifact ───────────────────────────────────
      # Zip, don't tar: this is meant to be unzipped by hand on macOS/Windows
      # before dragging the resulting SwipeAnnotator.mlmodelc folder into
      # Sideloadly alongside AIPlayer.dylib. Zipping it ourselves first keeps
      # SwipeAnnotator.mlmodelc's internal directory structure intact as a
      # single nameable download, rather than relying on the double-zip
      # actions/upload-artifact would otherwise produce from a bare folder.
      - name: Package Core ML model for Sideloadly
        run: |
          set -euo pipefail
          test -d SwipeAnnotator.mlmodelc || {
            echo "ERROR: SwipeAnnotator.mlmodelc missing -- did the 'Convert checkpoint to Core ML' step run?"
            exit 1
          }
          zip -r SwipeAnnotator.mlmodelc.zip SwipeAnnotator.mlmodelc
          echo "Zipped for Sideloadly:"
          unzip -l SwipeAnnotator.mlmodelc.zip | head -20

      - name: Upload Core ML model (for Sideloadly injection)
        uses: actions/upload-artifact@v4
        with:
          name: SwipeAnnotator-mlmodelc
          path: SwipeAnnotator.mlmodelc.zip
          if-no-files-found: error