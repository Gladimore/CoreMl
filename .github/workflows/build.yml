name: Build AIPlayer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos SDKs
        uses: actions/cache@v4
        with:
          path: ~/theos/sdks
          key: theos-sdks-${{ runner.os }}-v1

      - name: Cache Theos core
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-${{ hashFiles('**/Makefile') }}-v1
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install packaging tools (dpkg, ldid)
        run: |
          set -euo pipefail
          brew install dpkg ldid
          # NOTE: deliberately not installing fakeroot here. Homebrew's
          # native arm64 build of fakeroot ships an arm64e-only
          # libfakeroot.dylib, which crashes dyld on GitHub's Apple Silicon
          # runners ("incompatible architecture (have 'arm64', need
          # 'arm64e')"). Theos's deb.mk invokes packaging as
          # `$(FAKEROOT) -r dpkg-deb ...` — overriding FAKEROOT to empty
          # (see the `make package FAKEROOT=` below) makes that line run
          # dpkg-deb directly, no fakeroot wrapper at all. fakeroot only
          # fakes file ownership (root:root) in the resulting .deb; in this
          # ephemeral CI container there's no real multi-user ownership to
          # fake, and the sideloaded tweak installs identically either way.
          #
          # ldid IS required, though: Theos's default TARGET_CODESIGN for
          # the iphone target is `ldid`, not Apple's codesign, even on a
          # native macOS host (jailbroken devices need an ad-hoc/pseudo
          # signature, not a real Apple identity). Without it, the
          # "Signing" step in `make package` fails with a confusing
          # "bash: -c: command not found" / Error 127 instead of a clear
          # "ldid: command not found". Sanity-check it below the same way
          # dpkg-deb is checked, in case a future Homebrew bottle has the
          # same arm64/arm64e mismatch fakeroot had.
          which ldid
          ldid -h > /dev/null 2>&1 || { echo "ERROR: ldid installed but not runnable (check dyld arch errors above)"; exit 1; }

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          if [ -d "$HOME/theos" ]; then
            echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
            echo "$HOME/theos/bin"   >> "$GITHUB_PATH"
          else
            echo "ERROR: Theos not found"; exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Core ML conversion dependencies
        run: |
          set -euo pipefail
          pip install torch coremltools

      # ── Checkpoint -> Core ML ────────────────────────────────────────────
      # Produces SwipeAnnotator.mlmodelc in the repo root. The Makefile's
      # GrayHueCapture_RESOURCE_DIRS = SwipeAnnotator.mlmodelc then copies
      # it into the tweak's resource bundle during `make`. This step MUST
      # run before Build.
      #
      # --checkpoint points at checkpoints/best.pt, committed to this repo.
      # If your checkpoint lives somewhere else (Kaggle, cloud storage),
      # replace this with a download step that produces that same path
      # before the conversion runs.
      - name: Convert checkpoint to Core ML
        run: |
          set -euo pipefail
          python convert_to_coreml.py \
            --checkpoint checkpoints/best.pt \
            --out SwipeAnnotator.mlpackage \
            --min_ios iOS26 \
            --img_size 128
          xcrun coremlcompiler compile SwipeAnnotator.mlpackage .
          test -d SwipeAnnotator.mlmodelc || { echo "ERROR: SwipeAnnotator.mlmodelc was not produced"; exit 1; }
          echo "Model compiled:"
          du -sh SwipeAnnotator.mlmodelc

      - name: Build tweak
        run: |
          set -euo pipefail
          which dpkg-deb || echo "WARNING: dpkg-deb not on PATH — packaging will fail"
          which ldid || echo "WARNING: ldid not on PATH — signing will fail"
          make clean || true

          # Installing ldid did NOT fix the "bash: -c: command not found"
          # failure on the Signing step — it reproduced byte-for-byte with
          # ldid present on PATH. That means the broken token isn't coming
          # from a missing tool, it's coming from how this project's
          # Makefile config builds the codesign command line itself.
          # `make -n` (dry-run) still fully expands recipe text, including
          # $(shell ...) substitutions, without executing anything, so it
          # should print the exact command that's failing. Remove this
          # block once the cause is identified.
          echo "::group::Dry run (make -n) — inspecting signing command"
          make -n package FINALPACKAGE=1 FAKEROOT= V=1 > /tmp/dry-run.log 2>&1 || true
          echo "----- lines mentioning ldid/codesign -----"
          grep -n -iE 'ldid|codesign' /tmp/dry-run.log || echo "(no matches in dry-run output — see full log below)"
          echo "----- full dry-run log -----"
          cat /tmp/dry-run.log
          echo "::endgroup::"

          # FAKEROOT= (empty) skips fakeroot entirely — see note in the
          # "Install packaging tools" step above for why.
          make package FINALPACKAGE=1 FAKEROOT= V=1

      - name: Locate build output
        id: find_deb
        run: |
          set -euo pipefail
          ls -la packages/ 2>/dev/null || echo "packages/ directory does not exist — packaging step did not run or failed silently"
          DEB_PATH=$(find packages -name '*.deb' 2>/dev/null | head -n1)
          if [ -z "$DEB_PATH" ]; then
            echo "ERROR: no .deb produced under packages/. Check the 'Build tweak' step log above for dpkg-deb errors."
            exit 1
          fi
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-dylib
          path: .theos/obj/arm64/AIPlayer.dylib
          if-no-files-found: error

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-deb
          path: ${{ steps.find_deb.outputs.deb_path }}
          if-no-files-found: error
