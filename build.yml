name: Build AIPlayer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos SDKs
        uses: actions/cache@v4
        with:
          path: ~/theos/sdks
          key: theos-sdks-${{ runner.os }}-v1

      - name: Cache Theos core
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-${{ runner.os }}-${{ hashFiles('**/Makefile') }}-v1
          restore-keys: |
            theos-${{ runner.os }}-

      - name: Install packaging tools (dpkg, ldid)
        run: |
          set -euo pipefail
          brew install dpkg ldid
          which ldid
          ldid -h > /dev/null 2>&1 || { echo "ERROR: ldid installed but not runnable (check dyld arch errors above)"; exit 1; }

          # NOTE: deliberately not brew-installing fakeroot. Homebrew's
          # native arm64 build ships an arm64e-only libfakeroot.dylib, which
          # crashes dyld on GitHub's Apple Silicon runners ("incompatible
          # architecture (have 'arm64', need 'arm64e')").
          #
          # Theos's $(FAKEROOT) is NOT just "the fakeroot binary" -- it's
          # $THEOS/bin/fakeroot.sh plus a -p <persistence-file> argument
          # (see common.mk), and it's invoked throughout staging/signing,
          # not only in deb.mk's packaging line. Blanking FAKEROOT= at the
          # top-level `make` invocation makes ALL of those call sites see
          # an empty value -- including a bare `$(FAKEROOT) -c` used during
          # staging to close out the persistence file, which then becomes
          # the literal token `-c` executed as a command, producing
          # "bash: -c: command not found" / Error 127 inside `before-stage`,
          # before the build ever reaches packaging.
          #
          # Fix: give Theos a working `fakeroot` on PATH instead of
          # removing FAKEROOT globally. This ephemeral CI container has no
          # real multi-user ownership to fake, so a shim that strips
          # fakeroot's own flags/persistence args and execs the wrapped
          # command directly is sufficient, and it keeps every internal
          # $(FAKEROOT) call site -- staging, signing, and the final
          # dpkg-deb packaging line -- working uniformly.
          mkdir -p "$HOME/.local/bin"
          # Piped through sed to strip the leading whitespace that YAML's
          # block-scalar indentation would otherwise bake into the heredoc
          # body (which would break the shebang line).
          cat << 'EOF' | sed 's/^[[:space:]]*//' > "$HOME/.local/bin/fakeroot"
          #!/bin/sh
          while [ "$#" -gt 0 ]; do
          case "$1" in
          --) shift; break ;;
          -i|-s|-p) shift 2 ;;
          *) shift ;;
          esac
          done
          exec "$@"
          EOF
          chmod +x "$HOME/.local/bin/fakeroot"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          which fakeroot

      - name: Install Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          if [ -d "$HOME/theos" ]; then
            echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
            echo "$HOME/theos/bin"   >> "$GITHUB_PATH"
          else
            echo "ERROR: Theos not found"; exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Core ML conversion dependencies
        run: |
          set -euo pipefail
          # torch pinned to 2.7.0 -- coremltools' own warning during
          # conversion flagged that 2.13.0 (latest at the time this was
          # written) "has not been tested with coremltools", and 2.7.0 as
          # "the most recent version that has been tested". That mismatch
          # is the likely cause of a real failure we hit: `coremlcompiler`
          # errored out compiling MIL to the BNNS graph backend with
          # "Unsupported opset for gather op" -- almost certainly because a
          # too-new torch traced an op shape/pattern (from indexing the
          # GRU's hidden state, e.g. h_fast_new[-1]) that this coremltools
          # version's BNNS backend doesn't yet recognize. If you bump this
          # pin later, re-verify the compiled .mlmodelc actually loads
          # (see the sanity-check step below) before trusting it.
          pip install torch==2.7.0 coremltools

      # ── Checkpoint -> Core ML ────────────────────────────────────────────
      # Produces SwipeAnnotator.mlmodelc in the repo root. The Makefile's
      # GrayHueCapture_RESOURCE_DIRS = SwipeAnnotator.mlmodelc then copies
      # it into the tweak's resource bundle during `make`. This step MUST
      # run before Build.
      #
      # --checkpoint points at checkpoints/best.pt, committed to this repo.
      # If your checkpoint lives somewhere else (Kaggle, cloud storage),
      # replace this with a download step that produces that same path
      # before the conversion runs.
      - name: Convert checkpoint to Core ML
        run: |
          set -euo pipefail
          python convert_to_coreml.py \
            --checkpoint checkpoints/best.pt \
            --out SwipeAnnotator.mlpackage \
            --min_ios iOS26 \
            --img_size 128

          # `xcrun coremlcompiler compile` can print "Error(s) occurred
          # compiling MIL to BNNS graph" and still exit 0, still producing a
          # SwipeAnnotator.mlmodelc directory -- BNNS graph is an optional
          # fast execution path, and coremlcompiler doesn't always treat a
          # failure to build it as fatal to the overall compile. That let a
          # broken model sail straight through the old `test -d` check
          # below, get packaged, and fail silently on-device instead of
          # here. Capture the compiler's output explicitly and treat any
          # "error" text as fatal regardless of exit code, since the exit
          # code alone isn't trustworthy for this failure mode.
          xcrun coremlcompiler compile SwipeAnnotator.mlpackage . 2>&1 | tee /tmp/coremlcompiler.log
          compiler_status=${PIPESTATUS[0]}
          if [ "$compiler_status" -ne 0 ] || grep -qi "error" /tmp/coremlcompiler.log; then
            echo "ERROR: coremlcompiler reported a failure (or nonzero exit) -- see log above."
            exit 1
          fi

          test -d SwipeAnnotator.mlmodelc || { echo "ERROR: SwipeAnnotator.mlmodelc was not produced"; exit 1; }
          echo "Model compiled:"
          du -sh SwipeAnnotator.mlmodelc

          # Load-back sanity check: confirms the .mlmodelc is actually a
          # valid, loadable model (not just a directory that happens to
          # exist) by running one dummy forward pass through it. A
          # structurally-broken graph fails here, in CI, instead of showing
          # up as "model not loaded" / a hollow prediction on-device.
          #
          # Shapes below mirror the fixed --img_size 128 above and
          # AIPlayer.xm's kHidden/kFastLayers/kSlowLayers constants
          # (192/2/1, so slow_hidden = 192/2 = 96). If you change the
          # architecture or img_size, update both this block and the
          # matching constants in AIPlayer.xm together.
          python3 - << 'PYEOF'
          import coremltools as ct
          import numpy as np

          m = ct.models.MLModel("SwipeAnnotator.mlmodelc")
          spec = m.get_spec()
          print(f"Loaded OK. {len(spec.description.input)} inputs, {len(spec.description.output)} outputs.")

          img = 128
          inputs = {
              "fast_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "slow_frame": np.zeros((1, 2, img, img), dtype=np.float32),
              "has_slow":   np.zeros((1,), dtype=np.float32),
              "h_fast_in":  np.zeros((2, 1, 192), dtype=np.float32),
              "h_slow_in":  np.zeros((1, 1, 96), dtype=np.float32),
          }
          out = m.predict(inputs)
          for k, v in out.items():
              print(f"  {k}: shape={np.array(v).shape}")
          print("Dummy forward pass succeeded.")
          PYEOF

      - name: Build tweak
        run: |
          set -euo pipefail
          which dpkg-deb || echo "WARNING: dpkg-deb not on PATH — packaging will fail"
          which ldid || echo "WARNING: ldid not on PATH — signing will fail"
          which fakeroot || echo "WARNING: fakeroot shim not on PATH — staging/signing will fail"
          make clean || true

          # No FAKEROOT= override here — see note in the "Install packaging
          # tools" step above for why blanking it globally broke staging.
          # The shim on PATH lets Theos's own $(FAKEROOT) work as intended.
          make package FINALPACKAGE=1 V=1

      - name: Locate build output
        id: find_deb
        run: |
          set -euo pipefail
          ls -la packages/ 2>/dev/null || echo "packages/ directory does not exist — packaging step did not run or failed silently"
          DEB_PATH=$(find packages -name '*.deb' 2>/dev/null | head -n1)
          if [ -z "$DEB_PATH" ]; then
            echo "ERROR: no .deb produced under packages/. Check the 'Build tweak' step log above for dpkg-deb errors."
            exit 1
          fi
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-dylib
          path: .theos/obj/arm64/AIPlayer.dylib
          if-no-files-found: error

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-deb
          path: ${{ steps.find_deb.outputs.deb_path }}
          if-no-files-found: error
